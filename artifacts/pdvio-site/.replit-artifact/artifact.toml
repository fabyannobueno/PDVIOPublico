kind = "web"
previewPath = "/"
title = "PDVIO"
version = "1.0.0"
id = "artifacts/pdvio-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22106

[services.development]
run = "pnpm --filter @workspace/pdvio-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdvio-site", "run", "build" ]
publicDir = "artifacts/pdvio-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22106"
BASE_PATH = "/"
